services:
  - type: web
    name: launchpixel-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # You MUST manually add the following in the Render dashboard after connecting:
      # - DB_HOST
      # - DB_PORT
      # - DB_NAME
      # - DB_USER
      # - DB_PASSWORD
      # - SESSION_SECRET
      # - CLIENT_URL (Your Cloudflare URL)
